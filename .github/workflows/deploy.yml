name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout with full git history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        run: gem install jekyll kramdown kramdown-parser-gfm

      - name: Auto-update last_modified_at from git log
        run: |
          python3 - <<'EOF'
          import subprocess, re, os

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['.git', '_site', '_includes', '_layouts']]
              for fname in files:
                  if not fname.endswith('.md'):
                      continue
                  path = os.path.join(root, fname)
                  result = subprocess.run(
                      ['git', 'log', '-1', '--format=%ad', '--date=format:%Y-%m-%d', '--', path],
                      capture_output=True, text=True
                  )
                  date = result.stdout.strip()
                  if not date:
                      continue
                  with open(path, 'r', encoding='utf-8') as f:
                      content = f.read()
                  content = content.replace('\r\n', '\n')
                  new_content = re.sub(
                      r'^last_modified_at:.*$',
                      f'last_modified_at: {date}',
                      content,
                      count=1,
                      flags=re.MULTILINE
                  )
                  if new_content != content:
                      with open(path, 'w', encoding='utf-8') as f:
                          f.write(new_content)
                      print(f'Updated: {path} -> {date}')
          EOF

      - name: Build Jekyll
        run: jekyll clean && jekyll build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
