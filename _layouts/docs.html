<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #e6edf3;
    }

    a {
      color: #8ab4f8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .docs-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #111827;
      border-right: 1px solid #1f2937;
      padding: 20px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    
    .sidebar h2 {
      font-size: 18px;
      margin: 0 0 16px;
      color: #ffffff;
      font-weight: 800;
      line-height: 1.3;
    }
    
    .sidebar h3 {
      font-size: 12px;
      margin: 20px 0 8px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.3;
      font-weight: 700;
    }
    
    .sidebar a {
      display: block;
      padding: 6px 10px;
      border-radius: 8px;
      color: #d1d5db;
      margin-bottom: 2px;
      line-height: 1.35;
      font-size: 13px;
      font-weight: 400;
    }
    
    .sidebar a:hover {
      background: #1f2937;
      text-decoration: none;
      color: #fff;
    }
    
    .sidebar a.active {
      background: #263244;
      color: #ffffff;
      font-weight: 600;
    }

    .content {
      flex: 1;
      width: 100%;
      padding: 40px 48px;
      color: #e5e7eb;
      font-size: 15px;
      line-height: 1.8;
      display: flex;
      justify-content: center;
    }

    .content-inner {
      width: 100%;
      max-width: 1200px;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4 {
      color: #ffffff;
      font-weight: 700;
    }

    .content h1 {
      margin: 0 0 20px;
      font-size: 36px;
      line-height: 1.2;
    }

    .content h2 {
      margin: 40px 0 16px;
      font-size: 28px;
      line-height: 1.25;
    }

    .content h3 {
      margin: 28px 0 12px;
      font-size: 22px;
      line-height: 1.3;
    }

    .content h4 {
      margin: 24px 0 10px;
      font-size: 18px;
      line-height: 1.35;
    }

    .content p {
      margin: 0 0 18px;
    }

    .content ul,
    .content ol {
      margin: 0 0 20px 24px;
      padding-left: 20px;
    }

    .content li {
      margin-bottom: 8px;
    }

    .content li > p {
      margin-bottom: 8px;
    }

    .content hr {
      margin: 32px 0;
      border: none;
      border-top: 1px solid #374151;
    }

    .content img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 20px 0;
      border-radius: 10px;
    }

    .content code {
      background: #161b22;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.95em;
    }

    .content pre {
      background: #161b22;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 20px 0;
    }

    .content pre code {
      background: transparent;
      padding: 0;
    }

    .content a {
      color: #8ab4f8;
    }

    .content strong {
      color: #ffffff;
    }

    .content em {
      color: #d1d5db;
    }

    .content blockquote {
      margin: 0 0 20px;
      padding: 12px 16px;
      border-left: 4px solid #374151;
      background: #111827;
      border-radius: 8px;
    }

    .compare-container {
      position: relative;
      width: 100%;
      margin: 24px 0;
      overflow: hidden;
      border-radius: 12px;
      background: #111827;
      border: 1px solid #1f2937;
      user-select: none;
      aspect-ratio: 16 / 9;
    }
    
    .compare-base {
      position: relative;
      width: 100%;
    }
    
    .compare-base img {
      display: block;
      width: 100%;
      height: 100%;
      margin: 0;
      border-radius: 0;
      object-fit: cover;
    }
    
    .compare-overlay {
      position: absolute;
      inset: 0;
      overflow: hidden;
      clip-path: inset(0 0 0 50%);
    }
    
    .compare-overlay img {
      display: block;
      width: 100%;
      height: 100%;
      margin: 0;
      border-radius: 0;
      object-fit: cover;
    }
    
    .compare-handle {
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 100%;
      background: rgba(255, 255, 255, 0.9);
      transform: translateX(-50%);
      z-index: 3;
      cursor: ew-resize;
    }
    
    .compare-handle::before {
      content: "↔";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
    
    .compare-label {
      position: absolute;
      top: 12px;
      z-index: 4;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: rgba(17, 24, 39, 0.78);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.12);
      line-height: 1;
      pointer-events: none;
    }
    
    .compare-label.before {
      left: 12px;
    }
    
    .compare-label.after {
      right: 12px;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 24px;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .docs-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 1px solid #1f2937;
      }

      .content {
        padding: 24px;
      }

      .content h1 {
        font-size: 30px;
      }

      .content h2 {
        font-size: 24px;
      }

      .content h3 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="docs-layout">
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>

    <main class="content">
      <div class="content-inner">
        <a class="top-link" href="/">← Back to Home</a>
        {{ content }}
      </div>
    </main>
  </div>

  <script>
    document.querySelectorAll('.compare-container').forEach((container) => {
      const overlay = container.querySelector('.compare-overlay');
      const handle = container.querySelector('.compare-handle');

      if (!overlay || !handle) return;

      let dragging = false;

      function setPosition(clientX) {
        const rect = container.getBoundingClientRect();
        let x = clientX - rect.left;
        x = Math.max(0, Math.min(x, rect.width));

        const percent = (x / rect.width) * 100;
        overlay.style.clipPath = `inset(0 0 0 ${percent}%)`;
        handle.style.left = percent + '%';
      }

      function startDrag(e) {
        dragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        setPosition(clientX);
      }

      function onMove(e) {
        if (!dragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        setPosition(clientX);
      }

      function endDrag() {
        dragging = false;
      }

      handle.addEventListener('mousedown', startDrag);
      container.addEventListener('mousedown', startDrag);

      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', endDrag);

      handle.addEventListener('touchstart', startDrag, { passive: true });
      container.addEventListener('touchstart', startDrag, { passive: true });

      window.addEventListener('touchmove', onMove, { passive: true });
      window.addEventListener('touchend', endDrag);
    });
  </script>
</body>
</html>
