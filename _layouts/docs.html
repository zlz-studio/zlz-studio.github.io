<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #e6edf3;
    }

    a {
      color: #8ab4f8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .docs-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #111827;
      border-right: 1px solid #1f2937;
      padding: 20px 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 20px;
      margin: 0 0 14px;
      color: #ffffff;
    }

    .sidebar h3 {
      font-size: 13px;
      margin: 18px 0 6px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.3;
    }
    
    .sidebar a {
      display: block;
      padding: 4px 10px;
      border-radius: 8px;
      color: #d1d5db;
      margin-bottom: 0;
      line-height: 1.35;
    }
    
    .sidebar a:hover {
      background: #1f2937;
      text-decoration: none;
      color: #fff;
    }

    .content {
      flex: 1;
      width: 100%;
      padding: 40px 48px;
      color: #e5e7eb;
      font-size: 15px;
      line-height: 1.8;
      display: flex;
      justify-content: center;
    }

    .content-inner {
      width: 100%;
      max-width: 1200px;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4 {
      color: #ffffff;
      font-weight: 700;
    }

    .content h1 {
      margin: 0 0 20px;
      font-size: 36px;
      line-height: 1.2;
    }

    .content h2 {
      margin: 40px 0 16px;
      font-size: 28px;
      line-height: 1.25;
    }

    .content h3 {
      margin: 28px 0 12px;
      font-size: 22px;
      line-height: 1.3;
    }

    .content h4 {
      margin: 24px 0 10px;
      font-size: 18px;
      line-height: 1.35;
    }

    .content p {
      margin: 0 0 18px;
    }

    .content ul,
    .content ol {
      margin: 0 0 20px 24px;
      padding-left: 20px;
    }

    .content li {
      margin-bottom: 8px;
    }

    .content li > p {
      margin-bottom: 8px;
    }

    .content hr {
      margin: 32px 0;
      border: none;
      border-top: 1px solid #374151;
    }

    .content img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 20px 0;
      border-radius: 10px;
    }

    .content code {
      background: #161b22;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.95em;
    }

    .content pre {
      background: #161b22;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 20px 0;
    }

    .content pre code {
      background: transparent;
      padding: 0;
    }

    .content a {
      color: #8ab4f8;
    }

    .content strong {
      color: #ffffff;
    }

    .content em {
      color: #d1d5db;
    }

    .content blockquote {
      margin: 0 0 20px;
      padding: 12px 16px;
      border-left: 4px solid #374151;
      background: #111827;
      border-radius: 8px;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 24px;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .docs-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 1px solid #1f2937;
      }

      .content {
        padding: 24px;
      }

      .content h1 {
        font-size: 30px;
      }

      .content h2 {
        font-size: 24px;
      }

      .content h3 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="docs-layout">
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>

    <main class="content">
      <div class="content-inner">
        <a class="top-link" href="/">← Back to Home</a>
        {{ content }}
      </div>
    </main>
  </div>
</body>
</html>
