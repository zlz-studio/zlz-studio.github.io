<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: #e6edf3;
    }

    a {
      color: #8ab4f8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .docs-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: #111827;
      border-right: 1px solid #1f2937;
      padding: 24px 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 20px;
      color: #ffffff;
    }

    .sidebar h3 {
      font-size: 13px;
      margin-top: 24px;
      margin-bottom: 10px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sidebar a {
      display: block;
      padding: 8px 10px;
      border-radius: 8px;
      color: #d1d5db;
      margin-bottom: 4px;
    }

    .sidebar a:hover {
      background: #1f2937;
      text-decoration: none;
      color: #fff;
    }

    .content {
      flex: 1;
      padding: 40px;
      max-width: 1000px;
      width: 100%;
    }

    .content h1,
    .content h2,
    .content h3 {
      color: #ffffff;
    }

    .content img {
      max-width: 100%;
      height: auto;
    }

    .content code {
      background: #161b22;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .content pre {
      background: #161b22;
      padding: 16px;
      border-radius: 12px;
      overflow-x: auto;
    }

    .top-link {
      display: inline-block;
      margin-bottom: 24px;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .docs-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 1px solid #1f2937;
      }

      .content {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="docs-layout">
    <aside class="sidebar">
      {% include sidebar.html %}
    </aside>

    <main class="content">
      <a class="top-link" href="/">← Back to Home</a>
      {{ content }}
    </main>
  </div>
</body>
</html>
